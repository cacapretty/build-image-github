name: Build and Push

on: [push]

permissions:
  contents: read
  packages: write

jobs:
  build-push-image:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build image
        run: docker build -t imageku .

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u cacapretty --password-stdin

      - name: Tag image
        run: docker tag imageku ghcr.io/cacapretty/imageku:latest

      - name: Push image
        run: docker push ghcr.io/cacapretty/imageku:latest
